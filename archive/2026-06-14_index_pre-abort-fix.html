<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日本語コンパニオン</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/wanakana/5.3.1/wanakana.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d1a; --bg2: #13132a; --bg3: #1a1a35;
  --border: rgba(180,140,255,0.10); --border2: rgba(180,140,255,0.24);
  --text: #eeeaf8; --text2: #9b94c0; --text3: #534e72;
  --pink: #ff6fa8; --pink2: #c44c7e;
  --cyan: #4fd8e8; --cyan2: #279aaa;
  --yellow: #ffe066; --purple: #b97fff; --purple2: #7a4fbf;
  --green: #6feaa0; --green2: #2a7a50;
  --s: 1;
}
html { font-size: calc(17px * var(--s)); }
body {
  font-family: "Noto Sans JP", sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; padding: 2rem 1.5rem 5rem;
  display: flex; justify-content: center;
}
#app { width: 100%; max-width: 780px; }

body.hide-furigana rt { display: none !important; }
ruby { display: inline-ruby; }
rt { font-family: "Noto Sans JP", sans-serif; font-size: 0.5rem; color: var(--pink); }

/* ── HEADER ── */
#header {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); margin-bottom: 1.8rem;
}
.app-title { font-family: "Noto Serif JP", serif; font-size: 1.3rem; color: var(--pink); letter-spacing: 0.08em; }
.app-sub { font-size: 0.65rem; color: var(--text3); letter-spacing: 0.1em; margin-top: 2px; }
#header-right { display: flex; gap: 0.5rem; align-items: center; }

/* ── CTRL BTNS ── */
.ctrl-btn {
  font-family: "Noto Sans JP", sans-serif; font-size: 0.65rem;
  padding: 0.26rem 0.75rem; background: transparent;
  border: 1px solid var(--border); border-radius: 99px;
  color: var(--text2); cursor: pointer; letter-spacing: 0.05em; white-space: nowrap;
  transition: border-color 0.12s, color 0.12s;
}
.ctrl-btn:hover { border-color: var(--border2); color: var(--text); }
.ctrl-btn.active { border-color: var(--cyan2); color: var(--cyan); }
#anki-btn { border-color: var(--pink2); color: var(--pink); }
#anki-btn:hover { border-color: var(--pink); box-shadow: 0 0 8px rgba(255,111,168,0.25); }
#scale-bar {
  display: flex; align-items: center; gap: 0.3rem;
  border-left: 1px solid var(--border); padding-left: 0.5rem; margin-left: 0.25rem;
}
.scale-btn {
  width: 1.4rem; height: 1.4rem; background: transparent;
  border: 1px solid var(--border); border-radius: 50%;
  color: var(--text2); cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.12s, color 0.12s; padding: 0; font-family: inherit;
}
.scale-btn:hover { border-color: var(--cyan2); color: var(--cyan); }
#scale-label { font-size: 0.58rem; color: var(--text3); min-width: 2rem; text-align: center; }
.deck-pill {
  font-family: "Noto Sans JP", sans-serif; font-size: 0.6rem;
  padding: 0.2rem 0.6rem; background: transparent;
  border: 1px solid var(--border); border-radius: 99px;
  color: var(--text2); cursor: pointer; white-space: nowrap;
  transition: border-color 0.12s, color 0.12s;
}
.deck-pill.active { border-color: var(--cyan2); color: var(--cyan); }
#deck-filter { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0.5rem 0 0.75rem; }
.ctrl-btn .badge {
  display: inline-block; background: var(--pink2); color: #fff;
  font-size: 0.48rem; border-radius: 99px; padding: 0 0.3rem; margin-left: 0.25rem;
}

/* ── SEARCH BAR ── */
#search-row {
  display: flex; gap: 0.6rem; margin-bottom: 0.7rem;
}
#search-input {
  flex: 1; font-family: "Noto Serif JP", serif; font-size: 1.1rem;
  padding: 0.75rem 1rem; background: var(--bg2);
  border: 1px solid var(--border2); border-radius: 10px;
  color: var(--cyan); outline: none; line-height: 1.8;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#search-input:focus { border-color: var(--pink2); box-shadow: 0 0 0 3px rgba(255,111,168,0.10); }
#search-input::placeholder { color: var(--text3); font-family: "Noto Sans JP", sans-serif; font-size: 0.85rem; }
#search-btn {
  font-family: "Noto Sans JP", sans-serif; font-size: 0.85rem;
  background: var(--pink2); border: none; border-radius: 10px;
  color: #fff; cursor: pointer; padding: 0 1.5rem;
  transition: background 0.15s; flex-shrink: 0;
}
#search-btn:hover { background: var(--pink); }
#search-hint {
  font-size: 0.62rem; color: var(--text3); margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 0.8rem;
}
.mode-pill {
  padding: 0.15rem 0.6rem; border-radius: 99px; font-size: 0.58rem;
  border: 1px solid var(--border2); letter-spacing: 0.08em; color: var(--text3);
}
.mode-pill.vocab { border-color: var(--cyan2); color: var(--cyan); }
.mode-pill.grammar { border-color: var(--purple); color: var(--purple); }
.pitch-display {
  display: inline-flex; align-items: flex-end; vertical-align: middle;
  font-size: inherit; font-family: inherit; color: inherit;
}
.ph { border-top: 2px solid var(--yellow); padding: 0 1px; }
.pl { border-top: 2px solid transparent; padding: 0 1px; }
.pd { border-top: 2px solid var(--yellow); border-right: 2px solid var(--yellow); padding: 0 3px 0 1px; }

/* ── BUNPRO SRS LEVEL PILLS ── */
.srs-pill {
  display: inline-block; font-size: 0.52rem; padding: 0.1rem 0.55rem;
  border-radius: 99px; border: 1px solid; letter-spacing: 0.07em; font-weight: 500;
}
.srs-ghost   { border-color: var(--pink);   color: var(--pink);   }
.srs-master  { border-color: var(--cyan);   color: var(--cyan);   }
.srs-expert  { border-color: var(--cyan2);  color: var(--cyan2);  }
.srs-seasoned{ border-color: var(--purple); color: var(--purple); }
.srs-adept   { border-color: var(--yellow); color: var(--yellow); }
.srs-beginner{ border-color: var(--text3);  color: var(--text3);  }
.srs-new     { border-color: var(--border2);color: var(--text3);  }

/* ── MODE TABS ── */
#mode-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; }
.mode-tab {
  font-family: "Noto Sans JP", sans-serif; font-size: 0.78rem;
  padding: 0.38rem 1.2rem; background: transparent;
  border: 1px solid var(--border); border-radius: 99px;
  color: var(--text2); cursor: pointer; letter-spacing: 0.05em;
  transition: border-color 0.12s, color 0.12s;
}
.mode-tab:hover { border-color: var(--border2); color: var(--text); }
.mode-tab.active { border-color: var(--cyan2); color: var(--cyan); }

/* ── PASTE PANEL ── */
#paste-panel { display: none; }
#paste-input {
  width: 100%; font-family: "Noto Serif JP", serif; font-size: 0.95rem;
  padding: 0.9rem 1rem; background: var(--bg2);
  border: 1px solid var(--border2); border-radius: 10px;
  color: var(--text); outline: none; line-height: 1.9; resize: vertical;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#paste-input:focus { border-color: var(--pink2); box-shadow: 0 0 0 3px rgba(255,111,168,0.10); }
#paste-input::placeholder { color: var(--text3); font-family: "Noto Sans JP", sans-serif; font-size: 0.8rem; }
#paste-submit-btn {
  margin-top: 0.6rem; font-family: "Noto Sans JP", sans-serif; font-size: 0.85rem;
  background: var(--pink2); border: none; border-radius: 10px;
  color: #fff; cursor: pointer; padding: 0.6rem 1.8rem;
  transition: background 0.15s;
}
#paste-submit-btn:hover { background: var(--pink); }
#paste-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#paste-results { margin-top: 1.8rem; }
.paste-word-section { margin-bottom: 2.5rem; }
.paste-word-divider {
  font-family: "Noto Serif JP", serif; font-size: 1.1rem; color: var(--text3);
  border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1rem;
  letter-spacing: 0.04em;
}
.paste-placeholder {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.1rem 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.paste-placeholder-word { font-family: "Noto Serif JP", serif; font-size: 1.1rem; color: var(--cyan); }
.paste-placeholder-reading { font-size: 0.72rem; color: var(--text3); margin-top: 2px; }

/* ── LOADING ── */
#loading { display: none; align-items: center; gap: 0.6rem; font-size: 0.75rem; color: var(--text3); padding: 2rem 0; }
.dots { display: inline-flex; gap: 4px; }
.dots span { width: 4px; height: 4px; border-radius: 50%; animation: pulse 1.2s infinite; }
.dots span:nth-child(1) { background: var(--pink); }
.dots span:nth-child(2) { background: var(--purple); animation-delay: 0.2s; }
.dots span:nth-child(3) { background: var(--cyan); animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { opacity: 0.25; transform: scale(1); } 40% { opacity: 1; transform: scale(1.4); } }

/* ── RESULT ── */
#result { display: none; }
.stream-preview {
  font-family: 'Noto Sans JP', monospace; font-size: 0.78rem; color: var(--text3);
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; padding: 1rem 1.2rem; white-space: pre-wrap;
  word-break: break-word; max-height: 380px; overflow-y: auto; opacity: 0.75; line-height: 1.6;
}
@keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
.fadein { animation: fadein 0.35s ease forwards; }

.result-header {
  display: flex; align-items: baseline; gap: 0.8rem; flex-wrap: wrap;
  margin-bottom: 1.2rem;
}
.result-word { font-family: "Noto Serif JP", serif; font-size: 2rem; color: var(--pink); line-height: 2.4; }
.result-reading { font-size: 0.9rem; color: var(--text2); }

.card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem;
  position: relative;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 1.5rem; right: 1.5rem; height: 1px;
  background: linear-gradient(90deg, transparent, var(--pink2), var(--purple2), transparent);
  opacity: 0.4;
}
.card-label {
  font-size: 0.58rem; color: var(--text3); letter-spacing: 0.15em;
  text-transform: uppercase; margin-bottom: 0.7rem;
}
.card-body { font-size: 0.88rem; color: var(--text2); line-height: 1.9; }
/* sentences */
.sentence-list { display: flex; flex-direction: column; gap: 1rem; }
.sentence-item { border-left: 2px solid var(--border2); padding-left: 0.9rem; }
.sentence-jp {
  font-family: "Noto Serif JP", serif; font-size: 1rem; line-height: 2.4; color: var(--text);
}
/* Kanji in results = cyan when furigana is on */
#result ruby, #paste-results ruby { color: var(--cyan); }
/* When furigana is off, revert kanji to surrounding text color */
body.hide-furigana #result ruby, body.hide-furigana #paste-results ruby { color: inherit; }
.sentence-en { font-size: 0.8rem; color: var(--text2); margin-top: 0.1rem; line-height: 1.6; }
.sentence-notes { font-size: 0.72rem; color: var(--text3); margin-top: 0.2rem; font-style: italic; }
.register-tag {
  display: inline-block; font-size: 0.52rem; padding: 0.1rem 0.5rem;
  border-radius: 99px; border: 1px solid var(--border2);
  color: var(--text3); margin-bottom: 0.3rem; letter-spacing: 0.06em;
}
.speak-btn {
  background: none; border: 1px solid var(--border2); color: var(--text2);
  border-radius: 4px; padding: 0 0.4rem; font-size: 0.7rem; cursor: pointer;
  line-height: 1.6; transition: color 0.15s, border-color 0.15s;
}
.speak-btn:hover { color: var(--cyan); border-color: var(--cyan); }
.anki-send-btn {
  background: none; border: 1px solid var(--border2); color: var(--text2);
  border-radius: 4px; padding: 0 0.5rem; font-size: 0.65rem; cursor: pointer;
  line-height: 1.6; transition: color 0.15s, border-color 0.15s;
}
.anki-send-btn:hover { color: var(--pink); border-color: var(--pink); }
.anki-send-btn.pending { color: var(--yellow); border-color: var(--yellow); }

/* confused-with */
.contrast-word { font-family: "Noto Serif JP", serif; color: var(--purple); font-size: 1rem; margin-bottom: 0.5rem; }

/* formation */
.formation-rule { margin-bottom: 0.7rem; }
.formation-mistake {
  font-size: 0.82rem; color: var(--yellow); background: rgba(255,224,102,0.06);
  border: 1px solid rgba(255,224,102,0.2); border-radius: 8px;
  padding: 0.6rem 0.9rem; line-height: 1.8;
}
.formation-mistake::before { content: '⚠️  '; }

/* export bar */
#export-bar {
  display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 1.2rem;
}

/* ── HISTORY ── */
.panel {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(13,13,26,0.94); backdrop-filter: blur(4px);
  padding: 3rem 2rem; overflow-y: auto;
}
.panel-inner { max-width: 680px; margin: 0 auto; }
.panel h2 { font-family: "Noto Serif JP", serif; font-size: 1.3rem; color: var(--pink); letter-spacing: 0.1em; line-height: 2.4; margin-bottom: 1rem; }
.history-entry {
  display: flex; align-items: center; gap: 0.8rem;
  padding: 0.65rem 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.history-entry:hover .h-word { color: var(--pink); }
.h-word { font-family: "Noto Serif JP", serif; font-size: 1rem; color: var(--cyan); min-width: 6rem; }
.h-reading { font-size: 0.72rem; color: var(--text3); min-width: 5rem; }
.h-mode { font-size: 0.58rem; padding: 0.1rem 0.5rem; border-radius: 99px; border: 1px solid var(--border2); color: var(--text3); }
.h-mode.vocab { border-color: var(--cyan2); color: var(--cyan); }
.h-mode.grammar { border-color: var(--purple); color: var(--purple); }
.h-time { font-size: 0.6rem; color: var(--text3); margin-left: auto; }
.h-del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 0.75rem; padding: 0.2rem 0.4rem; border-radius: 4px; opacity: 0; transition: opacity 0.12s, color 0.12s; flex-shrink: 0; }
.history-entry:hover .h-del-btn { opacity: 1; }
.h-del-btn:hover { color: var(--pink); }
.lang-switch { display: inline-flex; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2px; cursor: pointer; user-select: none; }
.lang-opt { padding: 0.15rem 0.55rem; border-radius: 14px; font-size: 0.78rem; color: var(--text3); transition: background 0.18s, color 0.18s; }
.lang-opt.active { background: var(--pink); color: #fff; }
.panel-actions { display: flex; gap: 0.6rem; margin-top: 1.4rem; }
.panel-btn {
  font-family: "Noto Sans JP", sans-serif; font-size: 0.75rem;
  background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text); cursor: pointer; padding: 0.5rem 1.2rem;
  transition: border-color 0.15s;
}
.panel-btn:hover { border-color: var(--cyan2); }
.panel-empty { color: var(--text3); font-size: 0.8rem; padding: 1.5rem 0; }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div>
      <div class="app-title"><ruby>日本語<rt>にほんご</rt></ruby>コンパニオン</div>
      <div class="app-sub">VOCAB · GRAMMAR · ANKI EXPORT</div>
    </div>
    <div id="header-right">
      <button class="ctrl-btn active" id="furigana-btn">ふりがな</button>
      <button class="ctrl-btn active" id="ime-btn">ローマ字</button>
      <div class="lang-switch" id="jj-btn" title="説明言語を切り替える">
        <span class="lang-opt" data-val="en">英語</span>
        <span class="lang-opt" data-val="ja">日本語</span>
      </div>
      <button class="ctrl-btn" id="history-btn"><ruby>履歴<rt>りれき</rt></ruby><span class="badge" id="history-count" style="display:none">0</span></button>
      <button class="ctrl-btn" id="anki-btn"><ruby>苦手<rt>にがて</rt></ruby></button>
      <button class="ctrl-btn" id="bunpro-btn"><ruby>文法<rt>ぶんぽう</rt></ruby><ruby>苦手<rt>にがて</rt></ruby></button>
      <div id="scale-bar">
        <button class="scale-btn" id="scale-down">−</button>
        <span id="scale-label">100%</span>
        <button class="scale-btn" id="scale-up">＋</button>
      </div>
    </div>
  </div>

  <div id="mode-tabs">
    <button class="mode-tab active" id="tab-lookup"><ruby>調<rt>しら</rt></ruby>べる</button>
    <button class="mode-tab" id="tab-paste"><ruby>読<rt>よ</rt></ruby>む</button>
  </div>

  <div id="search-row">
    <input type="text" id="search-input" placeholder="単語または文法パターンを入力…  例: 見る  /  ～てしまう" autocomplete="off" lang="ja" />
    <button id="search-btn"><ruby>調<rt>しら</rt></ruby>べる</button>
  </div>
  <div id="search-hint">
    <span>ローマ字入力対応</span>
    <span id="mode-indicator" class="mode-pill" style="display:none"></span>
  </div>

  <div id="paste-panel">
    <textarea id="paste-input" rows="7" placeholder="ゲームのセリフや記事をペーストしてください（DQ11・ヤクザなど）…"></textarea>
    <button id="paste-submit-btn">解析する</button>
    <div id="paste-results"></div>
  </div>

  <div id="loading">
    <div class="dots"><span></span><span></span><span></span></div>
    <span id="loading-text"><ruby>調<rt>しら</rt></ruby>べています…</span>
  </div>

  <div id="result"></div>

</div>

<!-- ANKI STRUGGLING CARDS PANEL -->
<div class="panel" id="anki-panel">
  <div class="panel-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem">
      <h2 style="margin:0">苦手カード</h2>
      <div style="display:flex;gap:0.4rem">
        <button class="panel-btn" id="anki-refresh-btn">更新</button>
        <button class="panel-btn" id="anki-close-btn">閉じる</button>
      </div>
    </div>
    <div id="anki-status"></div>
    <div id="anki-list"></div>
    <div class="panel-empty" id="anki-empty" style="display:none">苦手なカードが見つかりません。</div>
  </div>
</div>

<!-- BUNPRO TROUBLED GRAMMAR PANEL -->
<div class="panel" id="bunpro-panel">
  <div class="panel-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem">
      <h2 style="margin:0">文法苦手 <span style="font-size:0.7rem;color:var(--text3);font-family:'Noto Sans JP',sans-serif;letter-spacing:0.05em">BunPro</span></h2>
      <div style="display:flex;gap:0.4rem">
        <button class="panel-btn" id="bunpro-refresh-btn">更新</button>
        <button class="panel-btn" id="bunpro-close-btn">閉じる</button>
      </div>
    </div>
    <div id="bunpro-status"></div>
    <div id="bunpro-list"></div>
    <div class="panel-empty" id="bunpro-empty" style="display:none">苦手な文法が見つかりません。</div>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="panel" id="history-panel">
  <div class="panel-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem">
      <h2 style="margin:0"><ruby>履歴<rt>りれき</rt></ruby></h2>
      <button class="panel-btn" id="history-close-btn">閉じる</button>
    </div>
    <div id="history-list"></div>
    <div class="panel-empty" id="history-empty" style="display:none"><ruby>履歴<rt>りれき</rt></ruby>がありません。</div>
    <div class="panel-actions">
      <button class="panel-btn" id="history-clear-btn"><ruby>履歴<rt>りれき</rt></ruby>を<ruby>削除<rt>さくじょ</rt></ruby></button>
    </div>
  </div>
</div>

<script>
const HISTORY_KEY = 'companion_history_v1';
const MAX_HISTORY = 50;

/* ── STATE ── */
let furigana = true;
let jjMode = localStorage.getItem('companion_jj_v1') === '1';
let currentResult = null;
let currentAnkiNote = null;
let pendingAnkiBtn = null;
let pendingTimer = null;
let history = loadHistory();

/* ── FURIGANA ── */
function setFurigana(on) {
  furigana = on;
  document.body.classList.toggle('hide-furigana', !on);
  document.getElementById('furigana-btn').classList.toggle('active', on);
}
document.getElementById('furigana-btn').onclick = () => setFurigana(!furigana);

/* ── IME (WanaKana) ── */
const searchInput = document.getElementById('search-input');
let imeBound = false;
function bindIME() { if (!imeBound && window.wanakana) { wanakana.bind(searchInput, { IMEMode: true }); imeBound = true; } }
function unbindIME() { if (imeBound && window.wanakana) { wanakana.unbind(searchInput); imeBound = false; } }
bindIME();
document.getElementById('ime-btn').onclick = function() {
  if (imeBound) { unbindIME(); this.classList.remove('active'); }
  else { bindIME(); this.classList.add('active'); }

};

/* ── J-J MODE ── */
function setJJ(on) {
  jjMode = on;
  localStorage.setItem('companion_jj_v1', on ? '1' : '0');
  document.querySelectorAll('#jj-btn .lang-opt').forEach(opt =>
    opt.classList.toggle('active', on ? opt.dataset.val === 'ja' : opt.dataset.val === 'en'));
  if (currentResult) {
    searchInput.value = currentResult.input || currentResult.word || currentResult.pattern || '';
    doLookup();
  }
}
document.getElementById('jj-btn').onclick = () => setJJ(!jjMode);
document.querySelectorAll('#jj-btn .lang-opt').forEach(opt =>
  opt.classList.toggle('active', jjMode ? opt.dataset.val === 'ja' : opt.dataset.val === 'en'));

/* live mode detection */
searchInput.addEventListener('input', () => {
  const v = searchInput.value.trim();
  const ind = document.getElementById('mode-indicator');
  if (!v) { ind.style.display = 'none'; return; }
  const mode = detectMode(v);
  ind.textContent = mode === 'grammar' ? '文法' : '単語';
  ind.className = 'mode-pill ' + mode;
  ind.style.display = 'inline-block';
});
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.isComposing) doLookup(); });
document.getElementById('search-btn').onclick = doLookup;

/* ── PARTIAL JSON PARSING (progressive render while streaming) ── */
function unescJson(s) {
  return s.replace(/\\"/g, '"').replace(/\\\\/g, '\\').replace(/\\n/g, '\n').replace(/\\t/g, '\t').replace(/\\r/g, '');
}
function extractStr(text, field) {
  const m = text.match(new RegExp(`"${field}"\\s*:\\s*"((?:[^"\\\\]|\\\\.)*)"`));
  return m ? unescJson(m[1]) : undefined;
}
function parseObjAt(text, start) {
  let depth = 0, inStr = false, esc = false, i = start;
  while (i < text.length) {
    const c = text[i];
    if (esc) { esc = false; }
    else if (c === '\\' && inStr) { esc = true; }
    else if (c === '"') { inStr = !inStr; }
    else if (!inStr) {
      if (c === '{') depth++;
      else if (c === '}') { if (--depth === 0) { try { return JSON.parse(text.slice(start, i + 1)); } catch { return undefined; } } }
    }
    i++;
  }
  return undefined;
}
function advPast(text, start) {
  let depth = 0, inStr = false, esc = false, i = start;
  while (i < text.length) {
    const c = text[i];
    if (esc) { esc = false; } else if (c === '\\' && inStr) { esc = true; }
    else if (c === '"') { inStr = !inStr; }
    else if (!inStr) { if (c === '{') depth++; else if (c === '}') { if (--depth === 0) return i + 1; } }
    i++;
  }
  return i;
}
function extractObj(text, field) {
  const idx = text.indexOf(`"${field}"`); if (idx === -1) return undefined;
  const brace = text.indexOf('{', idx); if (brace === -1) return undefined;
  return parseObjAt(text, brace);
}
function extractArr(text, field) {
  const idx = text.indexOf(`"${field}"`); if (idx === -1) return [];
  const bracket = text.indexOf('[', idx); if (bracket === -1) return [];
  const items = []; let i = bracket + 1;
  while (i < text.length) {
    while (i < text.length && /[\s,]/.test(text[i])) i++;
    if (text[i] === ']' || i >= text.length) break;
    if (text[i] !== '{') { i++; continue; }
    const obj = parseObjAt(text, i); if (obj === undefined) break;
    items.push(obj); i = advPast(text, i);
  }
  return items;
}
function parsePartial(text) {
  const r = {};
  const mode = extractStr(text, 'mode'); if (mode) r.mode = mode;
  for (const f of ['word','reading','core_meaning','dont_use','frequency','anki_hint','pattern','real_meaning','bunpro_tip'])  {
    const v = extractStr(text, f); if (v !== undefined) r[f] = v;
  }
  r.sentences = extractArr(text, 'sentences');
  r.confused_with = extractObj(text, 'confused_with');
  r.formation = extractObj(text, 'formation');
  r.pitch_accent = extractObj(text, 'pitch_accent');
  return r;
}
function partialFieldCount(p) {
  return Object.keys(p).filter(k => { const v = p[k]; return v !== undefined && v !== null && !(Array.isArray(v) && v.length === 0); }).length + (p.sentences?.length || 0);
}

function detectMode(input) {
  const t = input.trim();
  if (/^[～〜]/.test(t) || t.includes('〜') || t.includes('～')) return 'grammar';
  if (/^[ぁ-ん]{3,}$/.test(t)) return 'grammar';
  return 'vocab';
}

/* ── LOOKUP ── */
async function doLookup() {
  const input = searchInput.value.trim();
  if (!input) return;

  const cached = history.find(h => h.input === input && !!h.jj === jjMode);
  if (cached) {
    currentResult = cached;
    renderResult(cached);
    return;
  }

  document.getElementById('result').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-text').innerHTML = `「${input}」を<ruby>調<rt>しら</rt></ruby>べています…`;

  try {
    const streamRes = await fetch('/api/lookup/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ input, jj: jjMode })
    });
    if (!streamRes.ok) {
      const text = await streamRes.text();
      let msg; try { msg = JSON.parse(text).error; } catch {}
      throw new Error(msg || `HTTP ${streamRes.status}`);
    }

    const reader = streamRes.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    let accumulated = '';
    let lastCount = 0;
    const resultEl = document.getElementById('result');

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(6)); } catch { continue; }
        if (evt.text) {
          accumulated += evt.text;
          const partial = parsePartial(accumulated);
          const count = partialFieldCount(partial);
          if (count > lastCount && (partial.mode || partial.word || partial.pattern)) {
            lastCount = count;
            resultEl.style.display = 'block';
            resultEl.innerHTML = partial.mode === 'grammar' ? renderGrammar(partial) : renderVocab(partial);
          }
        } else if (evt.done && evt.result) {
          evt.result.input = input;
          evt.result.jj = jjMode;
          currentResult = evt.result;
          addToHistory(evt.result);
          renderResult(evt.result);
        } else if (evt.error) {
          throw new Error(evt.error);
        }
      }
    }
  } catch (e) {
    renderError(e.message);
  }
  document.getElementById('loading').style.display = 'none';
}

/* ── RENDER ── */
function formatPitchDisplay(reading, pitchAccent) {
  if (!pitchAccent || !reading) return '';
  const n = pitchAccent.number;
  const smalls = new Set('ゃゅょぁぃぅぇぉャュョァィゥェォ');
  const morae = [];
  for (let i = 0; i < reading.length; i++) {
    if (i + 1 < reading.length && smalls.has(reading[i + 1])) {
      morae.push(reading[i] + reading[i + 1]); i++;
    } else {
      morae.push(reading[i]);
    }
  }
  const isHigh = (i) => {
    if (n === 0) return i > 0;
    if (n === 1) return i === 0;
    return i > 0 && i < n;
  };
  const dropIdx = n === 0 ? -1 : n - 1;
  const spans = morae.map((m, i) => {
    if (i === dropIdx) return `<span class="pd">${m}</span>`;
    return isHigh(i) ? `<span class="ph">${m}</span>` : `<span class="pl">${m}</span>`;
  }).join('');
  return `<span class="pitch-display">${spans}</span>`;
}

/* ── ANKI CARD CHECK ── */
async function checkAnkiCard(result) {
  currentAnkiNote = null;
  const section = document.getElementById('anki-card-section');
  if (!section) return;
  section.style.display = 'none';

  let data;
  try {
    const res = await fetch(`/api/anki/card?word=${encodeURIComponent(result.word || result.input)}`);
    data = await res.json();
  } catch { return; }
  if (data.error) return;

  section.style.display = '';
  const sentenceEl = document.getElementById('anki-current-sentence');
  const meaningEl = document.getElementById('anki-current-meaning');
  const statusEl = document.getElementById('anki-card-status');
  const deckEl = document.getElementById('anki-deck-name');

  if (data.found) {
    deckEl.textContent = data.deckName || '';
    deckEl.style.display = data.deckName ? '' : 'none';
    currentAnkiNote = data;
    sentenceEl.textContent = data.sentence || '(例文なし)';
    meaningEl.textContent = data.sentenceMeaning || '';
    if (!data.sentenceFieldKey) {
      statusEl.textContent = '例文フィールドを特定できませんでした';
      document.querySelectorAll('.anki-send-btn').forEach(btn => btn.style.display = 'none');
    } else if (data.needsMigration) {
      statusEl.textContent = '↓ 例文を送ると Reading・Meaning・Sentence 等のフィールドをカードに追加します';
      document.querySelectorAll('.anki-send-btn').forEach(btn => {
        btn.style.display = '';
        btn.title = 'カードを拡張してAnkiに送る';
      });
    } else {
      statusEl.textContent = `↓ 下の例文で「${data.sentenceFieldKey}」フィールドを置き換えられます`;
      document.querySelectorAll('.anki-send-btn').forEach(btn => {
        btn.style.display = '';
        btn.title = 'Ankiの例文を置き換える';
      });
    }
  } else {
    deckEl.textContent = '';
    deckEl.style.display = 'none';
    sentenceEl.textContent = 'このデッキにカードがありません';
    meaningEl.textContent = '';
    statusEl.textContent = '↓ 例文ボタンで「Companion」デッキにカードを新規作成';
    document.querySelectorAll('.anki-send-btn').forEach(btn => {
      btn.style.display = '';
      btn.title = 'Ankiにカードを追加';
    });
  }
}

function renderResult(r) {
  const el = document.getElementById('result');
  el.innerHTML = r.mode === 'vocab' ? renderVocab(r) : renderGrammar(r);
  el.style.display = 'block';
  el.classList.add('fadein');
  setTimeout(() => el.classList.remove('fadein'), 400);
  if (r.mode === 'vocab') checkAnkiCard(r);
  if (r.mode === 'grammar') checkBunproStatus(r);
}

/* ── ANKI CONFIRM ── */
function cancelPendingAnki() {
  if (pendingAnkiBtn) {
    pendingAnkiBtn.textContent = '→ Anki';
    pendingAnkiBtn.classList.remove('pending');
    pendingAnkiBtn = null;
  }
  clearTimeout(pendingTimer);
  pendingTimer = null;
}

/* ── TTS ── */
let activeSpeakBtn = null;
let ttsVoiceIndex = 0;

function speak(text, btn) {
  if (!window.speechSynthesis) return;

  if (activeSpeakBtn === btn) {
    if (speechSynthesis.paused) {
      speechSynthesis.resume();
      btn.textContent = '⏸';
    } else {
      speechSynthesis.pause();
      btn.textContent = '▶';
    }
    return;
  }

  if (activeSpeakBtn) activeSpeakBtn.textContent = '▶';
  speechSynthesis.cancel();
  activeSpeakBtn = btn;
  btn.textContent = '⏸';

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  utt.rate = 0.9;
  utt.onend = () => { btn.textContent = '▶'; activeSpeakBtn = null; };

  const trySpeak = () => {
    const jaVoices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja'));
    const enhanced = jaVoices.filter(v => v.name.includes('Enhanced') || v.name.includes('Premium'));
    const pool = enhanced.length ? enhanced : jaVoices;
    if (pool.length) utt.voice = pool[ttsVoiceIndex++ % pool.length];
    speechSynthesis.speak(utt);
  };
  // Chrome/macOS bug: speak() right after cancel() silently fails; 50ms delay flushes it
  const doSpeak = () => {
    if (speechSynthesis.getVoices().length) trySpeak();
    else speechSynthesis.addEventListener('voiceschanged', trySpeak, { once: true });
  };
  setTimeout(doSpeak, 50);
}

/* Cancel pending Anki confirm when clicking anywhere outside an anki-send-btn */
document.addEventListener('click', e => {
  if (pendingAnkiBtn && !e.target.closest('.anki-send-btn')) cancelPendingAnki();
}, true);

/* export, speak, and Anki send buttons (delegated, rendered fresh each time) */
document.getElementById('result').addEventListener('click', async e => {
  const speakBtn = e.target.closest('.speak-btn');
  if (speakBtn) {
    const jpEl = speakBtn.closest('.sentence-item').querySelector('.sentence-jp');
    const clone = jpEl.cloneNode(true);
    clone.querySelectorAll('rt').forEach(rt => rt.remove());
    speak(clone.textContent, speakBtn);
    return;
  }

  const sendBtn = e.target.closest('.anki-send-btn');
  if (sendBtn) {
    if (pendingAnkiBtn !== sendBtn) {
      cancelPendingAnki();
      pendingAnkiBtn = sendBtn;
      sendBtn.textContent = '確定?';
      sendBtn.classList.add('pending');
      pendingTimer = setTimeout(cancelPendingAnki, 3000);
      return;
    }
    cancelPendingAnki();
    const item = sendBtn.closest('.sentence-item');
    const jpClone = item.querySelector('.sentence-jp').cloneNode(true);
    jpClone.querySelectorAll('rt').forEach(rt => rt.remove());
    const jpText = jpClone.textContent;
    const jpHtml = item.querySelector('.sentence-jp').innerHTML;
    const enText = item.querySelector('.sentence-en')?.textContent || '';
    sendBtn.textContent = '…';
    sendBtn.disabled = true;
    try {
      if (currentAnkiNote && currentAnkiNote.needsMigration) {
        const res = await fetch('/api/anki/card/enrich', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            noteId: currentAnkiNote.noteId,
            modelName: currentAnkiNote.modelName,
            result: currentResult,
            sentence: { jp: jpText, translation: enText, html: jpHtml }
          })
        });
        if (!res.ok) throw new Error(`Enrich failed: ${res.status}`);
        await checkAnkiCard(currentResult);
      } else if (currentAnkiNote) {
        const res = await fetch('/api/anki/card/sentence', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            noteId: currentAnkiNote.noteId,
            modelName: currentAnkiNote.modelName,
            sentenceFieldKey: currentAnkiNote.sentenceFieldKey,
            sentence: jpText,
            sentenceMeaning: enText,
            sentenceMeaningKey: currentAnkiNote.sentenceMeaningKey,
            sentenceAudioKey: currentAnkiNote.sentenceAudioKey,
            word: currentResult.word || currentResult.input,
            sentenceHtml: jpHtml
          })
        });
        if (!res.ok) throw new Error(`Update failed: ${res.status}`);
        document.getElementById('anki-current-sentence').textContent = jpText;
        document.getElementById('anki-current-meaning').textContent = enText;
      } else {
        const res = await fetch('/api/anki/card/create', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ result: currentResult, sentence: { jp: jpHtml, translation: enText } })
        });
        if (!res.ok) throw new Error(`Create failed: ${res.status}`);
        await checkAnkiCard(currentResult);
      }
      sendBtn.textContent = '✓';
      setTimeout(() => { sendBtn.textContent = '→ Anki'; sendBtn.disabled = false; }, 2000);
    } catch (err) {
      sendBtn.textContent = '✗';
      sendBtn.disabled = false;
    }
    return;
  }

  if (e.target.id === 'copy-tsv-btn' && currentResult) {
    const tsv = toAnkiTSV(currentResult);
    navigator.clipboard.writeText(tsv).then(() => {
      e.target.textContent = 'コピーしました！';
      setTimeout(() => e.target.textContent = 'Ankiにコピー (TSV)', 2000);
    });
  }
  if (e.target.id === 'copy-json-btn' && currentResult) {
    navigator.clipboard.writeText(JSON.stringify(currentResult, null, 2)).then(() => {
      e.target.textContent = 'コピーしました！';
      setTimeout(() => e.target.textContent = 'JSONをコピー', 2000);
    });
  }
});

/* ── ANKI TSV ── */
function toAnkiTSV(r) {
  const strip = s => s.replace(/<[^>]+>/g, '');
  if (r.mode === 'vocab') {
    return r.sentences.map(s =>
      [r.word, r.reading, strip(s.jp), s.translation].join('\t')
    ).join('\n');
  } else {
    return r.sentences.map(s =>
      [r.pattern, '', strip(s.jp), s.translation].join('\t')
    ).join('\n');
  }
}

/* ── HISTORY ── */
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}
function saveHistory() {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, MAX_HISTORY))); } catch {}
}
function addToHistory(r) {
  history = history.filter(h => !(h.input === r.input && !!h.jj === !!r.jj));
  history.unshift(r);
  saveHistory();
  updateHistoryBadge();
}
function updateHistoryBadge() {
  const b = document.getElementById('history-count');
  b.textContent = history.length;
  b.style.display = history.length ? 'inline-block' : 'none';
}
updateHistoryBadge();

document.getElementById('history-btn').onclick = openHistoryPanel;
function filterHistory(query, mode) {
  const q = query.toLowerCase();
  document.querySelectorAll('#history-list .history-entry').forEach(el => {
    const wordMatch = !q || el.dataset.word.toLowerCase().includes(q);
    const modeMatch = mode === 'all' || el.dataset.mode === mode;
    el.style.display = wordMatch && modeMatch ? '' : 'none';
  });
  const anyVisible = [...document.querySelectorAll('#history-list .history-entry')]
    .some(el => el.style.display !== 'none');
  document.getElementById('history-empty').style.display = anyVisible ? 'none' : '';
}

function openHistoryPanel() {
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');
  list.innerHTML = '';

  // inject search row fresh each open so state resets
  const existingSearch = document.getElementById('h-search-row');
  if (existingSearch) existingSearch.remove();
  const searchRow = document.createElement('div');
  searchRow.id = 'h-search-row';
  searchRow.innerHTML = `
    <input id="h-search" placeholder="検索…" style="width:100%;box-sizing:border-box;background:var(--card);border:1px solid var(--border2);color:var(--text);padding:0.4rem 0.6rem;border-radius:6px;font-size:0.85rem;margin-bottom:0.5rem">
    <div id="h-mode-pills" style="display:flex;gap:0.4rem;margin-bottom:0.75rem">
      <button class="deck-pill active" data-mode="all">全て</button>
      <button class="deck-pill" data-mode="vocab">単語</button>
      <button class="deck-pill" data-mode="grammar">文法</button>
    </div>`;
  list.before(searchRow);

  if (!history.length) { empty.style.display = 'block'; }
  else {
    empty.style.display = 'none';
    history.forEach(r => {
      const d = document.createElement('div');
      d.className = 'history-entry';
      d.dataset.word = r.input || '';
      d.dataset.mode = r.mode || 'vocab';
      const label = r.mode === 'vocab' ? (r.word || r.input) : (r.pattern || r.input);
      const reading = r.reading || '';
      const time = r.timestamp ? new Date(r.timestamp).toLocaleDateString('ja-JP') : '';
      d.innerHTML = `
        <span class="h-word">${label}</span>
        <span class="h-reading">${reading}</span>
        <span class="h-mode ${r.mode}">${r.mode === 'vocab' ? '単語' : '文法'}</span>
        <span class="h-time">${time}</span>`;
      const delBtn = document.createElement('button');
      delBtn.className = 'h-del-btn';
      delBtn.textContent = '✕';
      delBtn.title = '削除';
      delBtn.onclick = e => {
        e.stopPropagation();
        if (!confirm(`「${label}」を履歴から削除しますか？`)) return;
        history = history.filter(h => !(h.input === r.input && !!h.jj === !!r.jj));
        saveHistory();
        updateHistoryBadge();
        d.remove();
        if (!document.querySelectorAll('#history-list .history-entry').length)
          document.getElementById('history-empty').style.display = '';
      };
      d.appendChild(delBtn);
      d.onclick = () => {
        currentResult = r;
        addToHistory(r);
        renderResult(r);
        document.getElementById('history-panel').style.display = 'none';
        searchInput.value = r.input || '';
      };
      list.appendChild(d);
    });
  }

  let hMode = 'all';
  document.getElementById('h-search').addEventListener('input', e =>
    filterHistory(e.target.value, hMode));
  document.getElementById('h-mode-pills').addEventListener('click', e => {
    const pill = e.target.closest('.deck-pill');
    if (!pill) return;
    hMode = pill.dataset.mode;
    document.querySelectorAll('#h-mode-pills .deck-pill').forEach(p =>
      p.classList.toggle('active', p === pill));
    filterHistory(document.getElementById('h-search').value, hMode);
  });

  document.getElementById('history-panel').style.display = 'block';
}

document.getElementById('history-close-btn').onclick = () => {
  document.getElementById('history-panel').style.display = 'none';
};
document.getElementById('history-clear-btn').onclick = () => {
  if (!confirm('履歴をすべて削除しますか？')) return;
  history = []; saveHistory(); updateHistoryBadge();
  document.getElementById('history-panel').style.display = 'none';
};
/* ── FONT SIZE SCALER ── */
let scale = 1;
function setScale(v) {
  scale = Math.min(2.0, Math.max(0.5, Math.round(v * 10) / 10));
  document.documentElement.style.setProperty('--s', scale);
  document.getElementById('scale-label').textContent = Math.round(scale * 100) + '%';
}
document.getElementById('scale-up').onclick   = () => setScale(scale + 0.1);
document.getElementById('scale-down').onclick = () => setScale(scale - 0.1);
window.addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) { e.preventDefault(); setScale(scale + (e.deltaY < 0 ? 0.1 : -0.1)); }
}, { passive: false });

/* ── ANKI STRUGGLING CARDS ── */
function lapseBadgeColor(lapses) {
  if (lapses >= 5) return 'var(--pink)';
  if (lapses >= 3) return '#ff9944';
  return 'var(--yellow)';
}

function applyDeckFilter(activeDecks) {
  document.querySelectorAll('#anki-list .history-entry').forEach(el => {
    el.style.display = activeDecks.has(el.dataset.deck) ? '' : 'none';
  });
}

async function openAnkiPanel() {
  const panel = document.getElementById('anki-panel');
  const list = document.getElementById('anki-list');
  const empty = document.getElementById('anki-empty');
  const status = document.getElementById('anki-status');

  list.innerHTML = '';
  empty.style.display = 'none';
  status.innerHTML = '<div style="color:var(--text2);padding:1rem 0">読み込み中…</div>';
  panel.style.display = 'block';

  try {
    const res = await fetch('/api/anki/struggling');
    const data = await res.json();

    if (!res.ok) {
      status.innerHTML = `<div style="color:var(--pink);padding:1rem 0;line-height:1.6">
        AnkiConnectが見つかりません。<br>
        <span style="color:var(--text2);font-size:0.85rem">AnkiConnectプラグインをインストールしてAnkiを開いてください。<br>（Add-on code: 2055492159）</span>
      </div>`;
      return;
    }

    if (!data.cards.length) {
      status.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    // Build deck filter pills
    const decks = [...new Set(data.cards.map(c => c.deckName))].sort();
    const activeDecks = new Set(decks);
    const filterRow = document.createElement('div');
    filterRow.id = 'deck-filter';
    decks.forEach(deck => {
      const pill = document.createElement('button');
      pill.className = 'deck-pill active';
      pill.textContent = deck;
      pill.dataset.deck = deck;
      pill.onclick = () => {
        if (activeDecks.has(deck)) {
          if (activeDecks.size === 1) return; // keep at least one
          activeDecks.delete(deck);
          pill.classList.remove('active');
        } else {
          activeDecks.add(deck);
          pill.classList.add('active');
        }
        applyDeckFilter(activeDecks);
      };
      filterRow.appendChild(pill);
    });

    const summary = document.createElement('div');
    summary.style.cssText = 'color:var(--text2);font-size:0.8rem;padding-bottom:0.25rem';
    summary.textContent = `${data.total}枚中、上位${data.cards.length}枚を表示（ミス回数順）`;
    status.innerHTML = '';
    status.appendChild(summary);
    status.appendChild(filterRow);

    // Render card entries
    data.cards.forEach(card => {
      const d = document.createElement('div');
      d.className = 'history-entry';
      d.dataset.deck = card.deckName;
      const wordHtml = `<span class="h-word">${card.word}</span>`;
      d.innerHTML = `
        ${wordHtml}
        <span style="font-size:0.75rem;font-weight:700;color:${lapseBadgeColor(card.lapses)};margin-left:auto;white-space:nowrap">✕${card.lapses}</span>
        <span class="h-time">${card.deckName}</span>`;
      d.onclick = () => {
        searchInput.value = card.word;
        panel.style.display = 'none';
        doLookup();
      };
      list.appendChild(d);
    });
  } catch (err) {
    status.innerHTML = `<div style="color:var(--pink);padding:1rem 0">エラー: ${err.message}</div>`;
  }
}

document.getElementById('anki-btn').onclick = openAnkiPanel;
document.getElementById('anki-close-btn').onclick = () => {
  document.getElementById('anki-panel').style.display = 'none';
};
document.getElementById('anki-refresh-btn').onclick = openAnkiPanel;

/* ── BUNPRO ── */
function srsClass(level) {
  const l = (level || '').toLowerCase();
  if (l === 'ghost')    return 'srs-ghost';
  if (l === 'master')   return 'srs-master';
  if (l === 'expert')   return 'srs-expert';
  if (l === 'seasoned') return 'srs-seasoned';
  if (l === 'adept')    return 'srs-adept';
  if (l === 'beginner') return 'srs-beginner';
  return 'srs-new';
}

function srsLabel(level) {
  const map = { ghost:'ゴースト', master:'マスター', expert:'エキスパート',
                seasoned:'シーズン', adept:'上達', beginner:'初心者', new:'新規' };
  return map[(level || '').toLowerCase()] || level || '不明';
}

function formatNextReview(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const now = new Date();
  const diffH = Math.round((d - now) / 3600000);
  if (diffH < 0) return '今すぐ';
  if (diffH < 1) return 'まもなく';
  if (diffH < 24) return `${diffH}時間後`;
  return `${Math.round(diffH / 24)}日後`;
}

async function checkBunproStatus(result) {
  const section = document.getElementById('bunpro-status-section');
  const body = document.getElementById('bunpro-status-body');
  if (!section || !body) return;
  section.style.display = 'none';

  let data;
  try {
    const res = await fetch(`/api/bunpro/grammar?pattern=${encodeURIComponent(result.pattern || result.input)}`);
    data = await res.json();
  } catch { return; }
  if (data.error) return; // key not set — silent

  section.style.display = '';

  if (!data.found) {
    body.innerHTML = `<span style="color:var(--text3);font-size:0.82rem">BunProに未登録</span>`;
    return;
  }

  const nextStr = formatNextReview(data.nextReview);
  const jlpt = data.jlpt ? `<span class="register-tag" style="margin-left:0.4rem">${data.jlpt}</span>` : '';
  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;margin-bottom:0.4rem">
      <span class="srs-pill ${srsClass(data.srsLevel)}">${srsLabel(data.srsLevel)}</span>
      ${jlpt}
    </div>
    <div style="font-size:0.8rem;color:var(--text2);display:flex;gap:1.2rem;flex-wrap:wrap">
      <span>次回 <strong style="color:var(--text)">${nextStr}</strong></span>
      <span>連続 <strong style="color:var(--green)">${data.correctStreak ?? 0}</strong></span>
      <span>失敗 <strong style="color:${(data.lapses || 0) >= 3 ? 'var(--pink)' : 'var(--text)'}">${data.lapses ?? 0}</strong></span>
    </div>`;
}

async function openBunproPanel() {
  const panel = document.getElementById('bunpro-panel');
  const list  = document.getElementById('bunpro-list');
  const empty = document.getElementById('bunpro-empty');
  const status = document.getElementById('bunpro-status');

  list.innerHTML = '';
  empty.style.display = 'none';
  status.innerHTML = '<div style="color:var(--text2);padding:1rem 0">読み込み中…</div>';
  panel.style.display = 'block';

  try {
    const res = await fetch('/api/bunpro/troubled');
    const data = await res.json();

    if (!res.ok) {
      const msg = data.error?.includes('BUNPRO_TOKEN')
        ? 'BUNPRO_TOKEN が設定されていません。<br><span style="font-size:0.82rem;color:var(--text2)">.env に BUNPRO_TOKEN を追加してサーバーを再起動してください。</span>'
        : `BunPro APIエラー: ${data.error || res.status}`;
      status.innerHTML = `<div style="color:var(--pink);padding:1rem 0;line-height:1.8">${msg}</div>`;
      return;
    }

    status.innerHTML = '';
    if (!data.items?.length) { empty.style.display = 'block'; return; }

    data.items.forEach(item => {
      const d = document.createElement('div');
      d.className = 'history-entry';
      const jlpt = item.jlpt ? `<span class="h-mode">${item.jlpt}</span>` : '';
      d.innerHTML = `
        <span class="h-word" style="color:var(--purple)">${item.pattern}</span>
        <span class="h-reading" style="color:var(--text3)">${item.reading || ''}</span>
        ${jlpt}
        <span class="srs-pill ${srsClass(item.srsLevel)}" style="margin-left:auto">${srsLabel(item.srsLevel)}</span>
        <span style="font-size:0.65rem;color:var(--pink);font-weight:700;white-space:nowrap">✕${item.lapses}</span>`;
      d.onclick = () => {
        // Ensure pattern starts with ～ so grammar mode is detected
        const pat = item.pattern.startsWith('～') || item.pattern.startsWith('〜')
          ? item.pattern : `～${item.pattern}`;
        searchInput.value = pat;
        panel.style.display = 'none';
        setAppMode('lookup');
        doLookup();
      };
      list.appendChild(d);
    });
  } catch (err) {
    status.innerHTML = `<div style="color:var(--pink);padding:1rem 0">エラー: ${err.message}</div>`;
  }
}

document.getElementById('bunpro-btn').style.display = 'none';
fetch('/api/bunpro/status').then(r => r.json()).then(d => {

/* ── 読む MODE (PASTE) ── */
let currentPasteResults = {}; // word → result

function setAppMode(mode) {
  const isPaste = mode === 'paste';
  document.getElementById('tab-lookup').classList.toggle('active', !isPaste);
  document.getElementById('tab-paste').classList.toggle('active', isPaste);
  document.getElementById('search-row').style.display = isPaste ? 'none' : '';
  document.getElementById('search-hint').style.display = isPaste ? 'none' : '';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('paste-panel').style.display = isPaste ? 'block' : 'none';
  if (!isPaste) {
    document.getElementById('paste-results').innerHTML = '';
    currentPasteResults = {};
  }
}

document.getElementById('tab-lookup').onclick = () => setAppMode('lookup');
document.getElementById('tab-paste').onclick  = () => setAppMode('paste');


async function doPaste() {
  const text = document.getElementById('paste-input').value.trim();
  if (!text) return;

  const btn = document.getElementById('paste-submit-btn');
  const resultsEl = document.getElementById('paste-results');
  btn.disabled = true;
  btn.textContent = '解析中…';
  resultsEl.innerHTML = '';
  currentPasteResults = {};

  // word slug → index map for stable placeholder IDs
  const wordIdx = {};

  try {
    const res = await fetch('/api/paste/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, jj: jjMode })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(6)); } catch { continue; }

        if (evt.type === 'identified') {
          resultsEl.innerHTML = evt.words.map(({ word, reading, reason }, i) => {
            wordIdx[word] = i;
            return `<div class="paste-word-section" id="paste-slot-${i}">
              <div class="paste-placeholder">
                <div>
                  <div class="paste-placeholder-word">${word}</div>
                  ${reading ? `<div class="paste-placeholder-reading">【${reading}】</div>` : ''}
                  ${reason ? `<div style="font-size:0.7rem;color:var(--text3);margin-top:3px">${reason}</div>` : ''}
                </div>
                <div class="dots" style="margin-left:auto"><span></span><span></span><span></span></div>
              </div>
            </div>`;
          }).join('');

        } else if (evt.type === 'result') {
          currentPasteResults[evt.word] = evt.result;
          const i = wordIdx[evt.word];
          const slot = document.getElementById(`paste-slot-${i}`);
          if (slot) {
            const r = evt.result;
            const label = r.mode === 'grammar' ? (r.pattern || evt.word) : (r.word || evt.word);
            const reading = r.reading || '';
            slot.innerHTML = `
              <div class="paste-word-divider">${label}${reading ? ` 【${reading}】` : ''}</div>
              <div>${r.mode === 'grammar' ? renderGrammar(r, {compact:true}) : renderVocab(r, {compact:true})}</div>`;
          }

        } else if (evt.type === 'done') {
          if (Object.keys(currentPasteResults).length) {
            const bar = document.createElement('div');
            bar.id = 'paste-export-bar';
            bar.style.cssText = 'margin-top:1rem';
            bar.innerHTML = `<button class="ctrl-btn" id="paste-tsv-btn">全単語をAnkiにエクスポート (TSV)</button>`;
            resultsEl.appendChild(bar);
          }

        } else if (evt.type === 'error' && !evt.word) {
          resultsEl.innerHTML += `<div class="card"><div class="card-body" style="color:var(--pink)">エラー: ${evt.message}</div></div>`;
        }
      }
    }
  } catch (err) {
    resultsEl.innerHTML = `<div class="card"><div class="card-body" style="color:var(--pink)">エラー: ${err.message}</div></div>`;
  }

  btn.disabled = false;
  btn.textContent = '解析する';
}

document.getElementById('paste-submit-btn').onclick = doPaste;

document.getElementById('paste-results').addEventListener('click', e => {
  // speak buttons inside paste results
  const speakBtn = e.target.closest('.speak-btn');
  if (speakBtn) {
    const jpEl = speakBtn.closest('.sentence-item')?.querySelector('.sentence-jp');
    if (jpEl) {
      const clone = jpEl.cloneNode(true);
      clone.querySelectorAll('rt').forEach(rt => rt.remove());
      speak(clone.textContent, speakBtn);
    }
    return;
  }

  // bulk TSV export
  if (e.target.id === 'paste-tsv-btn') {
    const strip = s => s.replace(/<[^>]+>/g, '');
    const rows = Object.values(currentPasteResults).flatMap(r => {
      if (r.mode === 'vocab') {
        return (r.sentences || []).map(s => [r.word, r.reading, strip(s.jp), s.translation].join('\t'));
      }
      return (r.sentences || []).map(s => [r.pattern, '', strip(s.jp), s.translation].join('\t'));
    });
    navigator.clipboard.writeText(rows.join('\n')).then(() => {
      e.target.textContent = 'コピーしました！';
      setTimeout(() => { e.target.textContent = '全単語をAnkiにエクスポート (TSV)'; }, 2000);
    });
  }
});
